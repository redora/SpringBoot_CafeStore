<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>메뉴 등록</title>
</head>
<body>
    <h1>메뉴 등록</h1>

    <div>
        <label>이름</label>
        <input type="text" id="name" value="카푸치노">
    </div>

    <div>
        <label>가격</label>
        <input type="number" id="price" value="5200">
    </div>

    <div>
        <label>카테고리</label>
        <input type="text" id="category" value="coffee">
    </div>

    <button onclick="createMenu()">메뉴 등록</button>
    <button onclick="loadMenus()">전체 메뉴 조회</button>

    <h2>결과</h2>
    <pre id="result"></pre>

    <script>
        // POST /api/menus : 새 메뉴 등록
        async function createMenu() {
            const requestData = {
                name: document.getElementById("name").value,
                price: parseInt(document.getElementById("price").value, 10),
                category: document.getElementById("category").value
            };

            try {
                const response = await fetch("/api/menus", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(requestData)
                });

                if (!response.ok) {
                    throw new Error("메뉴 등록 요청에 실패했습니다. status=" + response.status);
                }

                const result = await response.json();

                document.getElementById("result").textContent =
                    "[등록 요청]\n" +
                    JSON.stringify(requestData, null, 2) +
                    "\n\n[등록 응답]\n" +
                    JSON.stringify(result, null, 2);
            } catch (error) {
                document.getElementById("result").textContent = error.message;
            }
        }

        // GET /api/menus : 전체 메뉴 목록 조회
        async function loadMenus() {
            try {
                const response = await fetch("/api/menus");

                if (!response.ok) {
                    throw new Error("메뉴 조회 요청에 실패했습니다. status=" + response.status);
                }

                const result = await response.json();

                document.getElementById("result").textContent =
                    "[전체 메뉴 조회 결과]\n" +
                    JSON.stringify(result, null, 2);
            } catch (error) {
                document.getElementById("result").textContent = error.message;
            }
        }
    </script>
</body>
</html>
